<!DOCTYPE html>
<html>
<head>
    <title>AI Healthcare - Describe Symptoms</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="chat-theme">
<div class="container chat-wrapper" style="max-width: 600px;">
    <div class="nav">
        <span class="logo">🩺 AI Healthcare Assistant</span>
        <span style="font-size: 0.85rem; color: #818cf8; background: rgba(129, 140, 248, 0.1); padding: 4px 10px; border-radius: 6px; font-weight: 600;">🏥 {{ hospital }}</span>
    </div>

    <div class="chat-container" style="height: auto; padding: 40px 30px;">
        <div class="report-header" style="border: none; margin-bottom: 10px; padding: 0;">
            <h2 style="font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Describe Your Symptoms</h2>
        </div>
        <p style="color: var(--text-secondary); margin-bottom: 30px; font-size: 0.95rem;">Please explain what symptoms you are experiencing (e.g. <i>"chest pain and diabetes"</i>).</p>

        <form action="/analyze" method="post">
            <div style="margin-bottom: 25px;">
                <label for="symptoms" style="display: block; font-size: 0.9rem; font-weight: 600; color: #cbd5e1; margin-bottom: 10px;">Symptoms description:</label>
                <textarea id="symptoms" name="symptoms" placeholder="Type your symptoms here..." required style="width: 100%; height: 120px; padding: 16px; border-radius: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); color: white; font-size: 0.95rem; font-family: 'Outfit'; outline: none; resize: none;"></textarea>
            </div>

            <button type="submit" class="btn-send" style="width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;">
                Run AI Diagnosis Report 🚀
            </button>
        </form>
    </div>
</div>
</body>
</html>
