<!DOCTYPE html>
<html>
<head>
    <title>AI Healthcare - Select Hospital</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="chat-theme">
<div class="container chat-wrapper" style="max-width: 600px;">
    <div class="nav">
        <span class="logo">🩺 AI Healthcare Assistant</span>
    </div>

    <div class="chat-container" style="height: auto; padding: 40px 30px;">
        <div class="report-header" style="border: none; margin-bottom: 10px; padding: 0;">
            <h2 style="font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Select Your Hospital</h2>
        </div>
        <p style="color: var(--text-secondary); margin-bottom: 30px; font-size: 0.95rem;">Please select the hospital facility you would like to visit for appointment booking.</p>

        <form action="/hospital" method="post">
            <div style="margin-bottom: 25px;">
                <label for="hospital" style="display: block; font-size: 0.9rem; font-weight: 600; color: #cbd5e1; margin-bottom: 10px;">Facility Location:</label>
                <select id="hospital" name="hospital" style="width: 100%; padding: 16px; border-radius: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); color: white; font-size: 0.95rem; font-family: 'Outfit'; outline: none;">
                    <option value="Texas Health Frisco" style="background: var(--bg-primary);">Texas Health Frisco</option>
                    <option value="Baylor Hospital" style="background: var(--bg-primary);">Baylor Hospital</option>
                </select>
            </div>

            <button type="submit" class="btn-send" style="width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;">
                Continue to Symptoms 🚀
            </button>
        </form>
    </div>
</div>
</body>
</html>
