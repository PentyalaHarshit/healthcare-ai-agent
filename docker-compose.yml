version: "3.9"

services:

  # ── MCP Server (port 8001) ───────────────────────────────────
  mcp_server:
    build: .
    container_name: healthcare_mcp_server
    command: uvicorn mcp_server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    restart: unless-stopped

  # ── Main App (port 8000) ─────────────────────────────────────
  main_app:
    build: .
    container_name: healthcare_main_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - mcp_server
    environment:
      - MCP_SERVER_URL=http://mcp_server:8001
    restart: unless-stopped
